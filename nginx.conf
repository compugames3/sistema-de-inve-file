# Josimar Cell - Nginx Configuration
# Copia este archivo a: /etc/nginx/sites-available/josimar-cell
# Luego crea un symlink: sudo ln -s /etc/nginx/sites-available/josimar-cell /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com www.tudominio.com;
    
    # Redirigir HTTP a HTTPS (descomentar después de configurar SSL)
    # return 301 https://$server_name$request_uri;
    
    root /var/www/josimar-cell;
    index index.html;

    # Logs
    access_log /var/log/nginx/josimar-cell-access.log;
    error_log /var/log/nginx/josimar-cell-error.log;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Servir index.html para todas las rutas (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Caché para fuentes
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # CORS para fuentes (si es necesario)
        add_header Access-Control-Allow-Origin *;
    }

    # No cachear HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

